<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語 Study</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4f0;
    --bg2: #ffffff;
    --bg3: #f0ece6;
    --red: #c0392b;
    --red-light: #e74c3c;
    --gold: #b8860b;
    --text: #1a1614;
    --text-dim: #5a5450;
    --text-muted: #9a9088;
    --border: #ddd8d0;
    --border-light: #c8c0b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  header {
    padding: 28px 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(247,244,240,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    letter-spacing: 0.15em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-kanji {
    font-size: 32px;
    color: var(--red);
    line-height: 1;
  }

  .logo-sub {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  nav {
    display: flex;
    gap: 32px;
  }

  nav a {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
    cursor: pointer;
  }

  nav a:hover, nav a.active { color: var(--text); }

  .date-badge {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    border: 1px solid var(--border-light);
    padding: 6px 14px;
    border-radius: 2px;
  }

  /* ─── SECTIONS ─── */
  .section {
    max-width: 900px;
    margin: 0 auto;
    padding: 72px 48px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 40px;
    letter-spacing: 0.05em;
  }

  /* ─── DAILY SENTENCE ─── */
  .sentence-card {
    background: var(--bg2);
    border: 1px solid var(--border-light);
    padding: 48px;
    position: relative;
    overflow: hidden;
  }

  .sentence-card::before {
    content: '今日';
    position: absolute;
    top: -10px;
    right: 24px;
    font-family: 'Shippori Mincho', serif;
    font-size: 80px;
    color: var(--border);
    line-height: 1;
    pointer-events: none;
  }

  .sentence-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 26px;
    font-weight: 300;
    line-height: 1.8;
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }

  .sentence-ruby ruby rt {
    font-size: 11px;
    color: var(--text-dim);
  }

  .sentence-kr {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.7;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .sentence-meta {
    margin-top: 20px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .meta-tag {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
    text-transform: uppercase;
  }

  .meta-tag.highlight { color: var(--gold); border-color: rgba(212,168,83,0.3); }

  /* daily words & grammar */
  .daily-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 32px;
  }

  .daily-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 24px;
  }

  .daily-card-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .word-item {
    display: flex;
    gap: 12px;
    align-items: baseline;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .word-item:last-child { border-bottom: none; }

  .word-kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    color: var(--text);
    min-width: 60px;
  }

  .word-furi {
    font-size: 11px;
    color: var(--text-dim);
    min-width: 80px;
  }

  .word-meaning {
    font-size: 13px;
    color: var(--text-dim);
  }

  .grammar-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .grammar-item:last-child { border-bottom: none; }

  .grammar-pattern {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .grammar-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .grammar-example {
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
    padding-left: 12px;
    border-left: 2px solid var(--border-light);
  }

  /* ─── JLPT QUIZ ─── */
  .quiz-card {
    background: var(--bg2);
    border: 1px solid var(--border-light);
    padding: 40px;
    margin-bottom: 16px;
  }

  .quiz-number {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .quiz-level {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 2px 8px;
    margin-bottom: 20px;
  }

  .quiz-question {
    font-family: 'Noto Serif JP', serif;
    font-size: 17px;
    line-height: 1.9;
    margin-bottom: 28px;
    letter-spacing: 0.04em;
  }

  .quiz-question .blank {
    display: inline-block;
    border-bottom: 2px solid var(--red);
    min-width: 80px;
    text-align: center;
    color: var(--red);
    font-weight: 700;
  }

  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .quiz-option {
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 14px 18px;
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    color: var(--text-dim);
    transition: all 0.2s;
    display: flex;
    gap: 12px;
    align-items: center;
    text-align: left;
  }

  .quiz-option:hover { border-color: var(--border-light); color: var(--text); background: #e8e4de; }
  .quiz-option.correct { border-color: #27ae60; color: #27ae60; background: rgba(39,174,96,0.05); }
  .quiz-option.wrong { border-color: var(--red); color: var(--red); background: rgba(192,57,43,0.05); }
  .quiz-option.disabled { cursor: not-allowed; }

  .option-num {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    min-width: 16px;
  }

  .quiz-explanation {
    margin-top: 20px;
    padding: 16px 20px;
    background: var(--bg3);
    border-left: 3px solid var(--gold);
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
    display: none;
  }

  .quiz-explanation.show { display: block; }

  .quiz-nav {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    align-items: center;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-dim);
    padding: 10px 24px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { border-color: var(--text-dim); color: var(--text); }
  .btn.primary { border-color: var(--red); color: var(--red); }
  .btn.primary:hover { background: var(--red); color: white; }

  .quiz-progress {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
    letter-spacing: 0.1em;
  }

  /* ─── GAME SECTION ─── */
  #game-section {
    max-width: 900px;
    margin: 0 auto;
    padding: 72px 48px;
  }

  .game-container {
    position: relative;
    background: var(--bg2);
    border: 1px solid var(--border-light);
    overflow: hidden;
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }

  .game-stat {
    text-align: center;
  }

  .game-stat-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .game-stat-value {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    color: var(--text);
  }

  .game-stat-value.score { color: var(--gold); }
  .game-stat-value.lives { color: var(--red); }

  #game-canvas {
    display: block;
    width: 100%;
    height: 480px;
    cursor: text;
  }

  .game-input-area {
    padding: 20px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    background: var(--bg3);
  }

  .game-input-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  #answer-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border-light);
    color: var(--text);
    padding: 10px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  #answer-input:focus { border-color: var(--red); }
  #answer-input::placeholder { color: var(--text-muted); font-size: 13px; }

  #answer-input.flash-correct {
    border-color: #27ae60;
    background: rgba(39,174,96,0.05);
  }

  #answer-input.flash-wrong {
    border-color: var(--red);
    background: rgba(192,57,43,0.05);
  }

  .game-controls {
    display: flex;
    gap: 10px;
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    align-items: center;
  }

  .speed-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-left: auto;
    margin-right: 8px;
  }

  .speed-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .speed-btn:hover, .speed-btn.active { border-color: var(--red-light); color: var(--red-light); }

  .game-overlay {
    position: absolute;
    inset: 0;
    background: rgba(247,244,240,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 10;
  }

  .overlay-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 36px;
    color: var(--text);
    letter-spacing: 0.1em;
  }

  .overlay-sub {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .overlay-score {
    font-family: 'Shippori Mincho', serif;
    font-size: 52px;
    color: var(--red);
  }

  /* ─── FOOTER ─── */
  footer {
    padding: 40px 48px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  /* ─── SCROLL ANIMATIONS ─── */
  .fade-in {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .fade-in.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* Responsive */
  @media (max-width: 700px) {
    header { padding: 20px 24px; }
    nav { display: none; }
    .section { padding: 48px 24px; }
    #game-section { padding: 48px 24px; }
    .daily-grid { grid-template-columns: 1fr; }
    .quiz-options { grid-template-columns: 1fr; }
    .sentence-card { padding: 28px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <span class="logo-kanji">語</span>
    <div>
      <div>日本語 Study</div>
      <div class="logo-sub">NHK Web Easy</div>
    </div>
  </div>
  <nav>
    <a class="active" onclick="navClick(this, 'daily')">오늘의 학습</a>
    <a onclick="navClick(this, 'quiz')">JLPT 문제</a>
    <a onclick="navClick(this, 'game-section')">단어 게임</a>
  </nav>
  <div class="date-badge" id="today-date"></div>
</header>

<!-- ─── SECTION 1: DAILY ─── -->
<section class="section fade-in" id="daily">
  <div class="section-label">오늘의 학습 / 今日の勉強</div>
  <h2 class="section-title">하루 한 줄</h2>

  <div class="sentence-card" id="sentence-card">
    <div class="sentence-jp" id="sentence-jp">로딩 중...</div>
    <div class="sentence-kr" id="sentence-kr"></div>
    <div class="sentence-meta" id="sentence-meta"></div>
  </div>

  <div class="daily-grid">
    <div class="daily-card fade-in">
      <div class="daily-card-title">오늘의 단어</div>
      <div id="daily-words"></div>
    </div>
    <div class="daily-card fade-in">
      <div class="daily-card-title">오늘의 문법</div>
      <div id="daily-grammar"></div>
    </div>
  </div>
</section>

<!-- ─── SECTION 2: JLPT QUIZ ─── -->
<section class="section fade-in" id="quiz">
  <div class="section-label">문제 풀기 / 問題練習</div>
  <h2 class="section-title">JLPT 연습 문제</h2>
  <div id="quiz-container"></div>
</section>

<!-- ─── SECTION 3: GAME ─── -->
<section id="game-section" class="fade-in">
  <div style="max-width:900px;margin:0 auto">
    <div class="section-label" style="margin-bottom:8px">일본어 단어 게임</div>
    <h2 class="section-title" style="margin-bottom:28px">한자 소나기 / 漢字の雨</h2>
  </div>

  <div class="game-container">
    <div class="game-header">
      <div class="game-stat">
        <div class="game-stat-label">Score</div>
        <div class="game-stat-value score" id="score-display">0</div>
      </div>
      <div class="game-stat">
        <div class="game-stat-label">Streak</div>
        <div class="game-stat-value" id="streak-display">0</div>
      </div>
      <div class="game-stat">
        <div class="game-stat-label">Lives</div>
        <div class="game-stat-value lives" id="lives-display">♥♥♥</div>
      </div>
      <div class="game-stat">
        <div class="game-stat-label">Level</div>
        <div class="game-stat-value" id="level-display">1</div>
      </div>
      <div class="game-stat" style="text-align:right">
        <div class="game-stat-label">단어 현황</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px" id="word-count">로딩 중...</div>
      </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div class="game-overlay" id="game-overlay">
      <div class="overlay-title" id="overlay-title">漢字の雨</div>
      <div class="overlay-sub" id="overlay-sub">한자가 땅에 닿기 전에 뜻을 입력하세요</div>
      <div class="overlay-score" id="overlay-score" style="display:none"></div>
      <button class="btn primary" id="overlay-btn" onclick="startGame()">게임 시작</button>
    </div>

    <div class="game-input-area">
      <span class="game-input-label">뜻 입력 →</span>
      <input type="text" id="answer-input" placeholder="한국어 뜻을 입력하세요..." autocomplete="off" />
    </div>

    <div class="game-controls">
      <button class="btn" onclick="pauseGame()" id="pause-btn">일시정지</button>
      <button class="btn" onclick="resetGame()">처음부터</button>
      <span class="speed-label">속도</span>
      <button class="speed-btn active" onclick="setSpeed(1, this)">보통</button>
      <button class="speed-btn" onclick="setSpeed(1.6, this)">빠름</button>
      <button class="speed-btn" onclick="setSpeed(2.2, this)">매우빠름</button>
    </div>
  </div>
</section>

<footer>
  <div style="font-family:'Shippori Mincho',serif;font-size:16px;color:var(--text-muted);margin-bottom:8px">日々の積み重ねが実力になる</div>
  매일의 축적이 실력이 된다 · NHK Web Easy 기반 일본어 학습
</footer>

<script>
// ─── DATE ───
const d = new Date();
document.getElementById('today-date').textContent =
  d.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

// ─── DATA.JSON 로드 (날짜 기반 콘텐츠) ───
async function loadDailyContent() {
  try {
    const res = await fetch('data.json?t=' + new Date().toDateString());
    const data = await res.json();

    // 날짜를 시드로 오늘의 인덱스 결정
    const dayOfYear = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);

    // ── 하루 한 줄 ──
    const sentence = data.sentences[dayOfYear % data.sentences.length];
    document.getElementById('sentence-jp').innerHTML = sentence.jp;
    document.getElementById('sentence-kr').textContent = sentence.kr;
    document.getElementById('sentence-meta').innerHTML = `
      <span class="meta-tag highlight">${sentence.grammar}</span>
      <span class="meta-tag">${sentence.level} 문법</span>
    `;

    // 오늘의 단어
    const wordsEl = document.getElementById('daily-words');
    wordsEl.innerHTML = sentence.words.map(w => `
      <div class="word-item">
        <span class="word-kanji">${w.kanji}</span>
        <span class="word-furi">${w.furi}</span>
        <span class="word-meaning">${w.meaning}</span>
      </div>
    `).join('');

    // 오늘의 문법 (문장에서 사용된 문법 설명)
    document.getElementById('daily-grammar').innerHTML = `
      <div class="grammar-item">
        <div class="grammar-pattern">${sentence.grammar}</div>
        <div class="grammar-desc">오늘의 문장에서 사용된 핵심 문법 패턴입니다.</div>
        <div class="grammar-example">${sentence.jp}<br>
          <span style="font-size:11px;color:var(--text-muted)">${sentence.kr}</span>
        </div>
      </div>
    `;

    // ── JLPT 문제 5개 (오늘 날짜 기반으로 순환) ──
    const quizData = [];
    for (let i = 0; i < 5; i++) {
      quizData.push(data.quiz[(dayOfYear * 5 + i) % data.quiz.length]);
    }
    window._quizData = quizData;
    renderQuiz();

  } catch (e) {
    console.error('data.json 로드 실패:', e);
    renderQuiz(); // 기존 quizData로 폴백
  }
}
loadDailyContent();

// ─── SCROLL TO + NAV ACTIVE ───
function navClick(el, id) {
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
}

// ─── AUTO NAV HIGHLIGHT ON SCROLL ───
const navSections = [
  { id: 'daily', idx: 0 },
  { id: 'quiz', idx: 1 },
  { id: 'game-section', idx: 2 }
];
const navLinks = document.querySelectorAll('nav a');

const sectionObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const match = navSections.find(s => s.id === e.target.id);
      if (match) {
        navLinks.forEach(a => a.classList.remove('active'));
        navLinks[match.idx].classList.add('active');
      }
    }
  });
}, { threshold: 0.3 });

navSections.forEach(s => {
  const el = document.getElementById(s.id);
  if (el) sectionObs.observe(el);
});

// ─── SCROLL ANIMATION ───
const obs = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));

// ─── QUIZ DATA (폴백용) ───
const quizData = [
  {
    level: 'N2', type: '문법',
    question: '彼女は毎日練習した（　　）、大会で優勝することができた。',
    options: ['おかげで', 'せいで', 'くせに', 'ものの'], answer: 0,
    explanation: '「おかげで」는 좋은 결과의 원인을 나타냅니다.'
  },
  {
    level: 'N2', type: '문법',
    question: '父は厳しい（　　）、とても優しい人だ。',
    options: ['ようで', 'ものの', 'ようでも', 'だからこそ'], answer: 1,
    explanation: '「ものの」는 역접 표현입니다.'
  },
  {
    level: 'N2', type: '어휘',
    question: '彼は問題を（　　）的に解決しようとした。',
    options: ['論理', '感情', '積極', '消極'], answer: 0,
    explanation: '「論理的」이 문맥상 가장 자연스럽습니다.'
  },
  {
    level: 'N1', type: '독해',
    question: '「石橋を叩いて渡る」の意味として最も適切なものはどれですか。',
    options: ['慎重に確認してから行動する', '勇気を持って困難に立ち向かう', '急いで物事を進める', '他人を信用しない'],
    answer: 0,
    explanation: '돌다리도 두드려보고 건넌다는 뜻입니다.'
  },
  {
    level: 'N2', type: '문법',
    question: '時間が（　　）、もっと勉強したいのに。',
    options: ['あれば', 'あると', 'あって', 'あるなら'], answer: 0,
    explanation: '「～ば」는 반사실적 조건을 나타냅니다.'
  }
];

let currentQ = 0;
let answered = false;

function renderQuiz() {
  const data = window._quizData || quizData;
  const q = data[currentQ];
  if (!q) return;
  const el = document.getElementById('quiz-container');
  el.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-number">문제 ${currentQ+1} / ${data.length}</div>
      <span class="quiz-level">${q.level} · ${q.type}</span>
      <div class="quiz-question">${q.question.replace('（　　）', '<span class="blank">（　　）</span>')}</div>
      <div class="quiz-options">
        ${q.options.map((opt, i) => `
          <button class="quiz-option" onclick="checkAnswer(${i})" id="opt-${i}">
            <span class="option-num">${i+1}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="quiz-explanation" id="quiz-exp">${q.explanation}</div>
    </div>
    <div class="quiz-nav">
      <button class="btn" onclick="prevQ()" ${currentQ===0?'disabled style="opacity:0.3"':''}>← 이전</button>
      <button class="btn primary" onclick="nextQ()" ${currentQ===data.length-1?'disabled style="opacity:0.3"':''}>다음 →</button>
      <span class="quiz-progress">${currentQ+1} / ${data.length}</span>
    </div>
  `;
  answered = false;
}

function checkAnswer(idx) {
  if (answered) return;
  answered = true;
  const data = window._quizData || quizData;
  const q = data[currentQ];
  document.querySelectorAll('.quiz-option').forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx && idx !== q.answer) btn.classList.add('wrong');
  });
  document.getElementById('quiz-exp').classList.add('show');
}

function nextQ() {
  const data = window._quizData || quizData;
  if (currentQ < data.length - 1) { currentQ++; renderQuiz(); }
}

function prevQ() {
  if (currentQ > 0) { currentQ--; renderQuiz(); }
}

// ─── GAME ───
// 기본 단어 (words.json 로드 실패 시 fallback)
const FALLBACK_WORDS = [
  { kanji: '努力', furi: 'どりょく', meaning: '노력' },
  { kanji: '結果', furi: 'けっか', meaning: '결과' },
  { kanji: '現れる', furi: 'あらわれる', meaning: '나타나다' },
  { kanji: '必ず', furi: 'かならず', meaning: '반드시' },
  { kanji: '経済', furi: 'けいざい', meaning: '경제' },
  { kanji: '問題', furi: 'もんだい', meaning: '문제' },
  { kanji: '解決', furi: 'かいけつ', meaning: '해결' },
  { kanji: '変化', furi: 'へんか', meaning: '변화' },
];

let WORDS = [...FALLBACK_WORDS];
let wordsLoaded = false;

// words.json 로드 (노션 연동 데이터)
async function loadWords() {
  const statusEl = document.getElementById('word-count');
  try {
    const res = await fetch('words.json?t=' + Date.now()); // 캐시 방지
    if (!res.ok) throw new Error('words.json 없음');
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      WORDS = data;
      wordsLoaded = true;
      if (statusEl) statusEl.textContent = `노션 단어 ${data.length}개 로드됨 ✓`;
    } else {
      throw new Error('단어 없음');
    }
  } catch (e) {
    WORDS = [...FALLBACK_WORDS];
    if (statusEl) statusEl.textContent = `기본 단어 ${FALLBACK_WORDS.length}개 사용 중`;
  }
}
loadWords();

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

let gameState = 'idle'; // idle, running, paused, gameover
let fallingWords = [];
let score = 0;
let streak = 0;
let lives = 3;
let level = 1;
let speedMult = 1;
let spawnInterval = null;
let animFrame = null;
let particles = [];
let usedIndices = new Set();

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = 480;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function getRandomWord() {
  if (usedIndices.size >= WORDS.length) usedIndices.clear();
  let idx;
  do { idx = Math.floor(Math.random() * WORDS.length); } while (usedIndices.has(idx));
  usedIndices.add(idx);
  return { ...WORDS[idx] };
}

function spawnWord() {
  if (fallingWords.length >= 5) return;
  const word = getRandomWord();
  const margin = 80;
  word.x = margin + Math.random() * (canvas.width - margin * 2);
  word.y = -40;
  word.speed = (0.5 + Math.random() * 0.5 + (level - 1) * 0.15) * speedMult;
  word.opacity = 1;
  word.hue = 0;
  fallingWords.push(word);
}

function drawWord(w) {
  ctx.save();
  ctx.globalAlpha = w.opacity;

  // glow based on proximity to bottom
  const danger = w.y / canvas.height;
  const glowAlpha = Math.max(0, danger - 0.5) * 2;
  if (glowAlpha > 0) {
    ctx.shadowColor = `rgba(192, 57, 43, ${glowAlpha * 0.8})`;
    ctx.shadowBlur = 20;
  }

  // kanji
  ctx.font = `bold 22px 'Noto Serif JP', serif`;
  ctx.fillStyle = danger > 0.7 ? `rgba(192,57,43,${w.opacity})` : `rgba(26,22,20,${w.opacity})`;
  ctx.textAlign = 'center';
  ctx.fillText(w.kanji, w.x, w.y);

  // furigana
  ctx.font = `12px 'Noto Serif JP', serif`;
  ctx.fillStyle = `rgba(90,84,80,${w.opacity * 0.9})`;
  ctx.fillText(w.furi, w.x, w.y + 18);

  ctx.restore();
}

function drawParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.03;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function spawnParticles(x, y, correct) {
  const color = correct ? '#27ae60' : '#c0392b';
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 / 12) * i;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (1 + Math.random() * 2),
      vy: Math.sin(angle) * (1 + Math.random() * 2) - 1,
      life: 1, size: 2 + Math.random() * 3, color
    });
  }
}

function drawBackground() {
  ctx.fillStyle = '#f7f4f0';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // subtle grid
  ctx.strokeStyle = 'rgba(180,170,160,0.35)';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 60) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 60) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // danger line
  const lineY = canvas.height - 2;
  ctx.strokeStyle = 'rgba(192,57,43,0.3)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 6]);
  ctx.beginPath(); ctx.moveTo(0, lineY); ctx.lineTo(canvas.width, lineY); ctx.stroke();
  ctx.setLineDash([]);
}

function gameLoop() {
  if (gameState !== 'running') return;
  drawBackground();

  fallingWords.forEach(w => { w.y += w.speed; });

  // check hits
  for (let i = fallingWords.length - 1; i >= 0; i--) {
    if (fallingWords[i].y > canvas.height + 20) {
      spawnParticles(fallingWords[i].x, canvas.height - 10, false);
      fallingWords.splice(i, 1);
      lives--;
      streak = 0;
      updateHUD();
      if (lives <= 0) { gameOver(); return; }
    }
  }

  fallingWords.forEach(w => drawWord(w));
  drawParticles();

  // level up
  level = Math.floor(score / 10) + 1;
  document.getElementById('level-display').textContent = level;

  animFrame = requestAnimationFrame(gameLoop);
}

function updateHUD() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('streak-display').textContent = streak;
  document.getElementById('lives-display').textContent = '♥'.repeat(Math.max(0,lives)) + '♡'.repeat(Math.max(0, 3-lives));
}

function startGame() {
  gameState = 'running';
  fallingWords = [];
  particles = [];
  score = 0; streak = 0; lives = 3; level = 1;
  usedIndices.clear();
  updateHUD();
  document.getElementById('game-overlay').style.display = 'none';
  document.getElementById('answer-input').focus();

  spawnWord();
  spawnInterval = setInterval(() => {
    if (gameState === 'running') spawnWord();
  }, Math.max(1500, 3000 - level * 100));

  animFrame = requestAnimationFrame(gameLoop);
}

function gameOver() {
  gameState = 'gameover';
  cancelAnimationFrame(animFrame);
  clearInterval(spawnInterval);
  const overlay = document.getElementById('game-overlay');
  overlay.style.display = 'flex';
  document.getElementById('overlay-title').textContent = 'Game Over';
  document.getElementById('overlay-sub').textContent = `레벨 ${level} · 스트릭 최고 ${streak}`;
  document.getElementById('overlay-score').style.display = 'block';
  document.getElementById('overlay-score').textContent = score;
  document.getElementById('overlay-btn').textContent = '다시 하기';
}

function pauseGame() {
  if (gameState === 'running') {
    gameState = 'paused';
    cancelAnimationFrame(animFrame);
    clearInterval(spawnInterval);
    document.getElementById('pause-btn').textContent = '계속하기';
  } else if (gameState === 'paused') {
    gameState = 'running';
    document.getElementById('pause-btn').textContent = '일시정지';
    spawnInterval = setInterval(() => { if (gameState === 'running') spawnWord(); }, 3000);
    animFrame = requestAnimationFrame(gameLoop);
  }
}

function resetGame() {
  gameState = 'idle';
  cancelAnimationFrame(animFrame);
  clearInterval(spawnInterval);
  fallingWords = [];
  particles = [];
  drawBackground();
  const overlay = document.getElementById('game-overlay');
  overlay.style.display = 'flex';
  document.getElementById('overlay-title').textContent = '漢字の雨';
  document.getElementById('overlay-sub').textContent = '한자가 땅에 닿기 전에 뜻을 입력하세요';
  document.getElementById('overlay-score').style.display = 'none';
  document.getElementById('overlay-btn').textContent = '게임 시작';
  document.getElementById('pause-btn').textContent = '일시정지';
}

function setSpeed(mult, btn) {
  speedMult = mult;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  fallingWords.forEach(w => { w.speed = w.speed / (speedMult || 1) * mult; });
}

// Answer input
const input = document.getElementById('answer-input');
input.addEventListener('input', () => {
  if (gameState !== 'running') return;
  const val = input.value.trim();
  if (!val) return;

  for (let i = 0; i < fallingWords.length; i++) {
    const w = fallingWords[i];
    const meanings = w.meaning.split('/').map(s => s.trim());
    const aliases = { '걱정': ['불안', '근심'], '나타나다': ['드러나다'], '중요하다': ['중요'], '판단': ['판단하다'] };
    const all = [...meanings, ...(aliases[w.meaning] || [])];

    if (all.includes(val)) {
      spawnParticles(w.x, w.y, true);
      fallingWords.splice(i, 1);
      score++;
      streak++;
      input.value = '';
      input.classList.add('flash-correct');
      setTimeout(() => input.classList.remove('flash-correct'), 300);
      updateHUD();
      return;
    }
  }
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && gameState === 'running') {
    const val = input.value.trim();
    if (!val) return;
    // wrong answer flash
    let matched = false;
    for (const w of fallingWords) {
      if (w.meaning.includes(val)) { matched = true; break; }
    }
    if (!matched) {
      input.classList.add('flash-wrong');
      setTimeout(() => input.classList.remove('flash-wrong'), 300);
      input.value = '';
    }
  }
});

// draw initial background
drawBackground();
</script>
</body>
</html>
