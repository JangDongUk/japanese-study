name: Sync Notion Words

on:
  schedule:
    - cron: '0 15 * * *'  # 매일 한국시간 자정 (UTC 15시)
  workflow_dispatch:        # 수동 실행도 가능

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch words from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          curl -X POST "https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query" \
            -H "Authorization: Bearer ${NOTION_API_KEY}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{"page_size": 100}' \
            -o raw_response.json

          python3 << 'EOF'
          import json

          with open("raw_response.json", "r") as f:
              data = json.load(f)

          results = data.get("results", [])
          print(f"📦 총 {len(results)}개 페이지 받음")

          # 첫 번째 항목의 properties 키 이름 출력 (디버그)
          if results:
              first = results[0]
              props = first.get("properties", {})
              print(f"🔑 컬럼 이름들: {list(props.keys())}")
              for k, v in props.items():
                  print(f"  - {k}: type={v.get('type')}")

          words = []
          for page in results:
              props = page.get("properties", {})

              def get_text(prop):
                  if not prop:
                      return ""
                  t = prop.get("type", "")
                  if t == "title":
                      parts = prop.get("title", [])
                  elif t == "rich_text":
                      parts = prop.get("rich_text", [])
                  else:
                      return ""
                  return "".join(p.get("plain_text", "") for p in parts).strip()

              kanji = ""
              furi = ""
              meaning = ""

              for key, val in props.items():
                  if val.get("type") == "title":
                      kanji = get_text(val)
                  elif key == "후리가나":
                      furi = get_text(val)
                  elif key == "의미":
                      meaning = get_text(val)

              # 의미가 여러 줄이면 첫 번째 줄만 사용
              if meaning and "\n" in meaning:
                  meaning = meaning.split("\n")[0].strip()
              if meaning and meaning[:2] in ["1.", "1 "]:
                  meaning = meaning[2:].strip()

              if kanji and furi and meaning:
                  words.append({"kanji": kanji, "furi": furi, "meaning": meaning})
              else:
                  print(f"  ⚠️ 스킵: kanji={repr(kanji)}, furi={repr(furi)}, meaning={repr(meaning)}")

          with open("words.json", "w", encoding="utf-8") as f:
              json.dump(words, f, ensure_ascii=False, indent=2)

          print(f"✅ {len(words)}개 단어 저장 완료")
          EOF

      - name: Commit and push words.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add words.json
          git diff --staged --quiet || git commit -m "🔄 Notion 단어 자동 동기화 $(date +'%Y-%m-%d')"
          git push
