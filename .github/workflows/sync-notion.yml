name: Sync Notion Words

on:
  schedule:
    - cron: '0 15 * * *'  # 매일 한국시간 자정 (UTC 15시)
  workflow_dispatch:        # 수동 실행도 가능

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch words from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          curl -X POST "https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query" \
            -H "Authorization: Bearer ${NOTION_API_KEY}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{"page_size": 100}' \
            -o raw_response.json

          python3 << 'EOF'
          import json

          with open("raw_response.json", "r") as f:
              data = json.load(f)

          words = []
          for page in data.get("results", []):
              props = page.get("properties", {})

              def get_text(prop):
                  if not prop:
                      return ""
                  t = prop.get("type", "")
                  if t == "title":
                      parts = prop.get("title", [])
                  elif t == "rich_text":
                      parts = prop.get("rich_text", [])
                  else:
                      return ""
                  return "".join(p.get("plain_text", "") for p in parts).strip()

              kanji   = get_text(props.get("한자"))
              furi    = get_text(props.get("후리가나"))
              meaning = get_text(props.get("의미"))

              if kanji and furi and meaning:
                  words.append({
                      "kanji": kanji,
                      "furi": furi,
                      "meaning": meaning
                  })

          with open("words.json", "w", encoding="utf-8") as f:
              json.dump(words, f, ensure_ascii=False, indent=2)

          print(f"✅ {len(words)}개 단어 저장 완료")
          EOF

      - name: Commit and push words.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add words.json
          git diff --staged --quiet || git commit -m "🔄 Notion 단어 자동 동기화 $(date +'%Y-%m-%d')"
          git push
